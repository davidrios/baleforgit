name: edge

on:
  workflow_dispatch:

concurrency:
  group: edge
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      version: edge
    # Forward only the macOS signing/notarization secrets build.yml declares —
    # not `inherit` (which would expose every repo secret to the build).
    secrets:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_INSTALLER_CERT_P12: ${{ secrets.MACOS_INSTALLER_CERT_P12 }}
      MACOS_INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
      AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
      AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
      AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum bale-* > SHA256SUMS

      # SPDX SBOM of the workspace dependency graph (syft reads Cargo.lock).
      # Named SBOM.spdx.json so it doesn't match the bale-* attestation glob.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/SBOM.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/bale-*"

      - name: Attest SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-path: "dist/bale-*"
          sbom-path: dist/SBOM.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      # Keyless (Sigstore) signature over the checksum manifest, verifiable
      # without GitHub's attestation API. Covers every artifact via SHA256SUMS.
      - name: Sign checksums (cosign keyless)
        shell: bash
        run: |
          cd dist
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem

      - name: Build release notes
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          {
            echo "Rolling build of the \`main\` branch — **not a stable release.**"
            echo
            echo "Built from \`$SHA\` on $DATE."
            echo
            git cliff --unreleased --strip header
            echo
            echo "---"
            echo "Verify a download's provenance:"
            echo '```'
            echo "gh attestation verify <file> --repo davidrios/baleforgit"
            echo '```'
            echo "Verify the dependency SBOM:"
            echo '```'
            echo "gh attestation verify <file> --repo davidrios/baleforgit \\"
            echo "  --predicate-type https://spdx.dev/Document"
            echo '```'
            echo "Verify the checksum signature (cosign keyless):"
            echo '```'
            echo "cosign verify-blob SHA256SUMS \\"
            echo "  --signature SHA256SUMS.sig --certificate SHA256SUMS.pem \\"
            echo "  --certificate-identity-regexp 'https://github.com/davidrios/baleforgit/.*' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com"
            echo '```'
          } > EDGE_BODY.md

      - name: Move edge tag
        run: |
          git tag -f edge
          git push -f origin edge

      - name: Publish edge prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view edge >/dev/null 2>&1; then
            gh release edit edge \
              --target "$GITHUB_SHA" \
              --title "Bleeding edge (main)" \
              --notes-file EDGE_BODY.md \
              --prerelease
            gh release upload edge dist/* --clobber
          else
            gh release create edge dist/* \
              --prerelease \
              --target "$GITHUB_SHA" \
              --title "Bleeding edge (main)" \
              --notes-file EDGE_BODY.md
          fi
