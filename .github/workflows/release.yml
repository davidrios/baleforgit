name: release

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  tag:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: read
        shell: bash
        run: |
          VERSION=$(grep -m1 -E '^version = ' Cargo.toml | sed -E 's/version = "([^"]*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          VERSION: ${{ steps.read.outputs.version }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"

  build:
    needs: tag
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.tag.outputs.version }}
    secrets: inherit

  publish:
    needs: [tag, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.tag.outputs.version }}
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum bale-* > SHA256SUMS

      # SPDX SBOM of the workspace dependency graph (syft reads Cargo.lock).
      # Named SBOM.spdx.json so it doesn't match the bale-* attestation glob.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/SBOM.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/bale-*"

      - name: Attest SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-path: "dist/bale-*"
          sbom-path: dist/SBOM.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v4

      # Keyless (Sigstore) signature over the checksum manifest, verifiable
      # without GitHub's attestation API. Covers every artifact via SHA256SUMS.
      - name: Sign checksums (cosign keyless)
        shell: bash
        run: |
          cd dist
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem

      - name: Build release notes
        shell: bash
        run: |
          {
            git cliff --current --strip header
            echo
            echo "---"
            echo "Verify a download's provenance:"
            echo '```'
            echo "gh attestation verify <file> --repo davidrios/baleforgit"
            echo '```'
            echo "Verify the dependency SBOM:"
            echo '```'
            echo "gh attestation verify <file> --repo davidrios/baleforgit \\"
            echo "  --predicate-type https://spdx.dev/Document"
            echo '```'
            echo "Verify the checksum signature (cosign keyless):"
            echo '```'
            echo "cosign verify-blob SHA256SUMS \\"
            echo "  --signature SHA256SUMS.sig --certificate SHA256SUMS.pem \\"
            echo "  --certificate-identity-regexp 'https://github.com/davidrios/baleforgit/.*' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com"
            echo '```'
          } > RELEASE_NOTES.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" dist/* \
            --title "v$VERSION" \
            --notes-file RELEASE_NOTES.md
