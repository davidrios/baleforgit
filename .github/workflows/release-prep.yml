name: release-prep

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, no leading v (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prep:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version
        shell: bash
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION' (expected semver like 0.2.0)"
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Bump workspace version
        shell: bash
        run: |
          # Replace the first top-level `version = "..."` line, which is the
          # [workspace.package] version (dependency versions like
          # `axum = { version = "..." }` are not at column 0). awk is used
          # instead of `sed -i '0,/re/'` because the latter is a GNU-only form.
          awk -v v="$VERSION" '!done && /^version = "/ {sub(/"[^"]*"/, "\"" v "\""); done=1} {print}' Cargo.toml > Cargo.toml.tmp
          mv Cargo.toml.tmp Cargo.toml
          grep -m1 -E '^version = ' Cargo.toml

      - name: Refresh Cargo.lock
        run: cargo update --workspace

      - name: Regenerate CHANGELOG.md
        run: git cliff --tag "v$VERSION" -o CHANGELOG.md

      - name: Extract notes for PR body
        run: git cliff --tag "v$VERSION" --current --strip header > RELEASE_NOTES.md

      - name: Push release branch
        shell: bash
        run: |
          BRANCH="release/v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore(release): v$VERSION"
          git push -f -u origin "$BRANCH"

          {
            echo "## Release v$VERSION branch pushed"
            echo
            echo "Open the PR: https://github.com/$GITHUB_REPOSITORY/compare/$BRANCH?expand=1"
            echo
            echo "Suggested PR body:"
            echo
            cat RELEASE_NOTES.md
          } >> "$GITHUB_STEP_SUMMARY"
